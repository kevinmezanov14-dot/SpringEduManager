<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Estudiantes - EduManager</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/main.css}">
<link rel="icon" type="image/svg+xml" th:href="@{/favicon.ico}">
</head>

<body>

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-4">

		<div class="d-flex justify-content-between align-items-center mb-3">
			<h2>Lista de Estudiantes</h2>

			<div>
				<a th:href="@{/}" class="btn btn-secondary">Inicio</a> <span
					sec:authorize="hasRole('ADMIN')"> <a
					th:href="@{/estudiantes/nuevo}" class="btn btn-primary"> ➕
						Agregar </a>
				</span>
			</div>
		</div>

		<!-- Mensaje de error -->
		<div th:if="${error}" class="alert alert-danger">
			<span th:text="${error}"></span>
		</div>

		<div class="card p-3 shadow">

			<table class="table table-striped table-hover">
				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Nombre</th>
						<th>Apellido</th>
						<th>Email</th>
						<th sec:authorize="hasRole('ADMIN')">Acciones</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="estudiante : ${estudiantes}">
						<td th:text="${estudiante.id}"></td>
						<td th:text="${estudiante.nombre}"></td>
						<td th:text="${estudiante.apellido}"></td>
						<td th:text="${estudiante.email}"></td>
						<td sec:authorize="hasRole('ADMIN')">
							<div class="table-actions">
								<a th:href="@{/estudiantes/editar/{id}(id=${estudiante.id})}"
									class="btn-edit">Editar</a> <a
									th:href="@{/estudiantes/eliminar/{id}(id=${estudiante.id})}"
									class="btn-delete" onclick="return confirm('¿Eliminar?')">Eliminar</a>
							</div>
						</td>

					</tr>
				</tbody>
			</table>

		</div>

	</div>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
