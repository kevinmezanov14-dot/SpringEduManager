<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Nuevo Estudiante - EduManager</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-4">

		<h2 class="mb-4">Agregar Estudiante</h2>

		<div class="card p-4 shadow">

			<form th:action="@{/estudiantes/guardar}" th:object="${estudiante}"
				method="post">

				<div class="mb-3">
					<label class="form-label">Nombre</label> <input type="text"
						th:field="*{nombre}" class="form-control" required>
				</div>

				<div class="mb-3">
					<label class="form-label">Apellido</label> <input type="text"
						th:field="*{apellido}" class="form-control" required>
				</div>

				<div class="mb-3">
					<label class="form-label">Email</label> <input type="email"
						th:field="*{email}" class="form-control" required>
				</div>

				<div class="d-flex gap-2">
					<button class="btn btn-success">💾 Guardar</button>
					<a th:href="@{/estudiantes}" class="btn btn-secondary">Cancelar</a>
				</div>

			</form>

		</div>

	</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
