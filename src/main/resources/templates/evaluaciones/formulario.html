<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Nueva Evaluación</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-4">

		<h2 class="mb-4">Agregar Evaluación</h2>

		<div class="card p-4 shadow">

			<form th:action="@{/evaluaciones/guardar}" th:object="${evaluacion}"
				method="post">

				<input type="hidden" th:field="*{id}" />

				<div class="mb-3">
					<label>Título</label> <input type="text" th:field="*{titulo}"
						class="form-control">
				</div>

				<div class="mb-3">
					<label>Descripción</label> <input type="text"
						th:field="*{descripcion}" class="form-control">
				</div>

				<div class="mb-3">
					<label>Nota</label> <input type="number" step="0.1"
						th:field="*{nota}" class="form-control">
				</div>

				<div class="mb-3">
					<label>Estudiante</label> <select th:field="*{estudiante.id}"
						class="form-select">
						<option th:each="est : ${estudiantes}" th:value="${est.id}"
							th:text="${est.nombre + ' ' + est.apellido}"></option>
					</select>
				</div>

				<div class="mb-3">
					<label>Curso</label> <select th:field="*{curso.id}"
						class="form-select">
						<option th:each="cur : ${cursos}" th:value="${cur.id}"
							th:text="${cur.nombre}"></option>
					</select>
				</div>

				<button class="btn btn-success">Guardar</button>
				<a th:href="@{/evaluaciones}" class="btn btn-secondary">Cancelar</a>

			</form>

		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
