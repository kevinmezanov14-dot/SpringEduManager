<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Evaluación - EduManager</title>
</head>
<body>

    <h2>Agregar Evaluación</h2>

    <form th:action="@{/evaluaciones/guardar}" th:object="${evaluacion}" method="post">
        <label>Título: <input type="text" th:field="*{titulo}"/></label><br/><br/>
        <label>Descripción: <input type="text" th:field="*{descripcion}"/></label><br/><br/>
        <label>Nota: <input type="number" step="0.1" th:field="*{nota}"/></label><br/><br/>

        <label>Estudiante:
            <select th:field="*{estudiante}">
                <option th:each="est : ${estudiantes}"
                        th:value="${est.id}"
                        th:text="${est.nombre + ' ' + est.apellido}">
                </option>
            </select>
        </label><br/><br/>

        <label>Curso:
            <select th:field="*{curso}">
                <option th:each="cur : ${cursos}"
                        th:value="${cur.id}"
                        th:text="${cur.nombre}">
                </option>
            </select>
        </label><br/><br/>

        <button type="submit">Guardar</button>
        <a th:href="@{/evaluaciones}">Cancelar</a>
    </form>

</body>
</html>
