<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Evaluación</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body>

	<div class="container mt-4">

		<h2>Formulario Evaluación</h2>

		<div class="card p-4">

			<form th:action="@{/evaluaciones/guardar}" th:object="${evaluacion}"
				method="post">

				<!-- ERRORES GLOBALES -->
				<div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
					<ul>
						<li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
					</ul>
				</div>

				<input type="hidden" th:field="*{id}" />

				<!-- TITULO -->
				<div class="mb-3">
					<label>Título</label> <input type="text" th:field="*{titulo}"
						class="form-control">
					<div th:errors="*{titulo}" class="text-danger"></div>
				</div>

				<!-- DESCRIPCION -->
				<div class="mb-3">
					<label>Descripción</label> <input type="text"
						th:field="*{descripcion}" class="form-control">
					<div th:errors="*{descripcion}" class="text-danger"></div>
				</div>

				<!-- NOTA -->
				<div class="mb-3">
					<label>Nota</label> <input type="number" step="0.1"
						th:field="*{nota}" class="form-control">
					<div th:errors="*{nota}" class="text-danger"></div>
				</div>

				<!-- ESTUDIANTE -->
				<div class="mb-3">
					<label>Estudiante</label> <select th:field="*{estudianteId}"
						class="form-select">
						<option value="">-- Seleccione --</option>
						<option th:each="est : ${estudiantes}" th:value="${est.id}"
							th:text="${est.nombre + ' ' + est.apellido}"></option>
					</select>
					<div th:errors="*{estudianteId}" class="text-danger"></div>
				</div>

				<!-- CURSO -->
				<div class="mb-3">
					<label>Curso</label> <select th:field="*{cursoId}"
						class="form-select">
						<option value="">-- Seleccione --</option>
						<option th:each="cur : ${cursos}" th:value="${cur.id}"
							th:text="${cur.nombre}"></option>
					</select>
					<div th:errors="*{cursoId}" class="text-danger"></div>
				</div>

				<button class="btn btn-success">Guardar</button>
				<a th:href="@{/evaluaciones}" class="btn btn-secondary">Cancelar</a>

			</form>

		</div>

	</div>

</body>
</html>
