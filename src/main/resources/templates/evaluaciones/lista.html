<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Evaluaciones - EduManager</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-4">

		<div class="d-flex justify-content-between mb-3">
			<h2>Lista de Evaluaciones</h2>

			<div>
				<a th:href="@{/}" class="btn btn-secondary">Inicio</a> <span
					sec:authorize="hasRole('ADMIN')"> <a
					th:href="@{/evaluaciones/nuevo}" class="btn btn-primary"> ➕
						Agregar </a>
				</span>
			</div>
		</div>

		<div class="card p-3 shadow">

			<table class="table table-striped table-hover">

				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Título</th>
						<th>Descripción</th>
						<th>Nota</th>
						<th>Estudiante</th>
						<th>Curso</th>
						<th sec:authorize="hasRole('ADMIN')">Acciones</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="evaluacion : ${evaluaciones}">
						<td th:text="${evaluacion.id}"></td>
						<td th:text="${evaluacion.titulo}"></td>
						<td th:text="${evaluacion.descripcion}"></td>
						<td th:text="${evaluacion.nota}"></td>

						<td
							th:text="${evaluacion.estudiante != null ? evaluacion.estudiante.nombre + ' ' + evaluacion.estudiante.apellido : '-'}"></td>

						<td
							th:text="${evaluacion.curso != null ? evaluacion.curso.nombre : '-'}"></td>

						<td sec:authorize="hasRole('ADMIN')"><a
							th:href="@{/evaluaciones/eliminar/{id}(id=${evaluacion.id})}"
							class="btn btn-danger btn-sm"> 🗑 Eliminar </a></td>
					</tr>
				</tbody>

			</table>

		</div>

	</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
