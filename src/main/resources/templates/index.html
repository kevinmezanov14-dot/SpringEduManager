
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Inicio - EduManager</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- CSS propio -->
<link rel="stylesheet" th:href="@{/css/main.css}">
<link rel="icon" type="image/svg+xml" th:href="@{/favicon.ico}">
</head>

<body class="bg-light">

	<!-- Navbar reutilizable -->
	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-4">

		<!-- Bienvenida -->
		<h2 class="mb-3">Bienvenido a EduManager</h2>

		<div class="mb-4">
			<p>
				👤 Usuario: <strong sec:authentication="name"></strong>
			</p>
			<p>
				🔐 Rol: <strong sec:authentication="authorities"></strong>
			</p>
		</div>

		<!-- Menú principal -->
		<div class="container-custom">

			<h2 class="mb-4">Panel principal</h2>

			<div class="row g-4">

				<!-- ESTUDIANTES -->
				<div class="col-12 col-sm-6 col-lg-3">
					<a th:href="@{/estudiantes}" class="card-link">
						<div class="card card-dashboard">

							<div class="card-img estudiantes"></div>

							<div class="card-body text-center">
								<h5>Estudiantes</h5>
								<p>Gestión de alumnos</p>
							</div>

						</div>
					</a>
				</div>

				<!-- CURSOS -->
				<div class="col-12 col-sm-6 col-lg-3" sec:authorize="hasRole('ADMIN')">
					<a th:href="@{/cursos}" class="card-link">
						<div class="card card-dashboard">

							<div class="card-img cursos"></div>

							<div class="card-body text-center">
								<h5>Cursos</h5>
								<p>Administrar cursos</p>
							</div>

						</div>
					</a>
				</div>

				<!-- EVALUACIONES -->
				<div class="col-12 col-sm-6 col-lg-3">
					<a th:href="@{/evaluaciones}" class="card-link">
						<div class="card card-dashboard">

							<div class="card-img evaluaciones"></div>

							<div class="card-body text-center">
								<h5>Evaluaciones</h5>
								<p>Notas y pruebas</p>
							</div>

						</div>
					</a>
				</div>

				<!-- PRACTICAS -->
				<div class="col-12 col-sm-6 col-lg-3">
					<a th:href="@{/practicas}" class="card-link">
						<div class="card card-dashboard">

							<div class="card-img practicas"></div>

							<div class="card-body text-center">
								<h5>Prácticas</h5>
								<p>Seguimiento práctico</p>
							</div>

						</div>
					</a>
				</div>

			</div>

		</div>

	</div>

	<!-- Bootstrap JS -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
