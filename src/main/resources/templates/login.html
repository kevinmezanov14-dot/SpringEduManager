<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - EduManager</title>
    <!-- CSS Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS propio -->
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.ico}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 login-page">

    <div class="card p-4 shadow login-card">
        <div class="text-center mb-4">
            <div class="header-logo mx-auto">EM</div>
            <h2 class="mt-2">Bienvenido</h2>
            <p class="login-subtitle">Inicia sesión para continuar</p>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group mb-3 position-relative">
                <i class="bi bi-person-fill input-icon"></i>
                <input type="text" name="username" id="username" class="form-control input-with-icon" placeholder="Usuario" required>
            </div>

            <div class="form-group mb-3 position-relative">
                <i class="bi bi-lock-fill input-icon"></i>
                <input type="password" name="password" id="password" class="form-control input-with-icon" placeholder="Contraseña" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-custom login-btn">Iniciar Sesión</button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">¿No tienes cuenta? <a th:href="@{/registro}">Regístrate</a></small>
        </div>
    </div>

    <!-- JS Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
