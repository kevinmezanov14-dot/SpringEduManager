
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - EduManager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS propio -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="login-body">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow login-card p-4">
        
        <h3 class="text-center mb-3">EduManager</h3>
        <p class="text-center text-muted">Iniciar sesión</p>

        <!-- ERROR -->
        <div th:if="${param.error}" class="alert alert-danger text-center">
            Usuario o contraseña incorrectos.
        </div>

        <!-- LOGOUT -->
        <div th:if="${param.logout}" class="alert alert-success text-center">
            Sesión cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Ingresar
            </button>

        </form>

        <div class="text-center mt-3">
            <a th:href="@{/registro}">¿No tienes cuenta? Regístrate</a>
        </div>

    </div>

</div>

</body>
</html>
