<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Prácticas - EduManager</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/main.css}">
<link rel="icon" type="image/svg+xml" th:href="@{/favicon.ico}">
</head>

<body>

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-4">

		<div class="d-flex justify-content-between align-items-center mb-3">
			<h2>Lista de Prácticas</h2>

			<div>
				<a th:href="@{/}" class="btn btn-secondary">Inicio</a> <span
					sec:authorize="hasRole('ADMIN')"> <a
					th:href="@{/practicas/nuevo}" class="btn btn-primary"> ➕
						Agregar </a>
				</span>
			</div>
		</div>

		<div class="card p-3 shadow">

			<table class="table table-striped table-hover">

				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Título</th>
						<th>Descripción</th>
						<th>Estado</th>
						<th>Estudiante</th>
						<th>Curso</th>
						<th sec:authorize="hasRole('ADMIN')">Acciones</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="practica : ${practicas}">
						<td th:text="${practica.id}"></td>
						<td th:text="${practica.titulo}"></td>
						<td th:text="${practica.descripcion}"></td>
						<td th:text="${practica.estado}"></td>
						<td
							th:text="${practica.estudiante != null ? practica.estudiante.nombre + ' ' + practica.estudiante.apellido : '-'}"></td>

						<td
							th:text="${practica.curso != null ? practica.curso.nombre : '-'}"></td>

						<td sec:authorize="hasRole('ADMIN')">
							<div class="table-actions">
								<a th:href="@{/practicas/editar/{id}(id=${practica.id})}"
									class="btn-edit">Editar</a> <a
									th:href="@{/practicas/eliminar/{id}(id=${practica.id})}"
									class="btn btn-danger btn-sm"> 🗑 Eliminar </a>
							</div>
						</td>
					</tr>
				</tbody>

			</table>

		</div>

	</div>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
