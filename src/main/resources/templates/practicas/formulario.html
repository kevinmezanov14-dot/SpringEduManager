<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Nueva Práctica - EduManager</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-4">

		<h2 class="mb-4">Agregar Práctica</h2>

		<div class="card p-4 shadow">
			<form th:action="@{/practicas/guardar}" th:object="${practica}"
				method="post">

				<div class="mb-3">
					<label>Título</label> <input type="text" th:field="*{titulo}"
						class="form-control">
					<div class="text-danger" th:if="${#fields.hasErrors('titulo')}"
						th:errors="*{titulo}"></div>
				</div>

				<div class="mb-3">
					<label>Descripción</label> <input type="text"
						th:field="*{descripcion}" class="form-control">
					<div class="text-danger"
						th:if="${#fields.hasErrors('descripcion')}"
						th:errors="*{descripcion}"></div>
				</div>

				<div class="mb-3">
					<label>Estado</label> <select th:field="*{estado}"
						class="form-select">
						<option value="">-- Seleccionar --</option>
						<option value="PENDIENTE">Pendiente</option>
						<option value="EN_PROGRESO">En Progreso</option>
						<option value="COMPLETADA">Completada</option>
					</select>
					<div class="text-danger" th:if="${#fields.hasErrors('estado')}"
						th:errors="*{estado}"></div>
				</div>

				<div class="mb-3">
					<label>Estudiante</label> <select th:field="*{estudiante.id}"
						class="form-select">
						<option value="">-- Seleccionar --</option>
						<option th:each="est : ${estudiantes}" th:value="${est.id}"
							th:text="${est.nombre + ' ' + est.apellido}"></option>
					</select>
					<div class="text-danger" th:if="${#fields.hasErrors('estudiante')}"
						th:errors="*{estudiante}"></div>
				</div>

				<div class="mb-3">
					<label>Curso</label> <select th:field="*{curso.id}"
						class="form-select">
						<option value="">-- Seleccionar --</option>
						<option th:each="cur : ${cursos}" th:value="${cur.id}"
							th:text="${cur.nombre}"></option>
					</select>
					<div class="text-danger" th:if="${#fields.hasErrors('curso')}"
						th:errors="*{curso}"></div>
				</div>

				<button class="btn btn-success">Guardar</button>
				<a th:href="@{/practicas}" class="btn btn-secondary">Cancelar</a>

			</form>
		</div>
	</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
