<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Registro - EduManager</title>
<!-- CSS Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<!-- CSS propio -->
<link rel="stylesheet" th:href="@{/css/login.css}">
<link rel="icon" type="image/svg+xml" th:href="@{/favicon.ico}">
</head>
<body
	class="d-flex justify-content-center align-items-center vh-100 login-page">

	<div class="card shadow login-card p-4">
		<h3 class="text-center mb-3">EduManager</h3>
		<p class="text-center text-muted">Registro de Usuario</p>

		<!-- Mensaje de error -->
		<div th:if="${error}" class="alert alert-danger text-center">
			<span th:text="${error}"></span>
		</div>

		<form th:action="@{/registro}" method="post">
			<div class="form-group mb-3">
				<label class="form-label">Usuario</label> <input type="text"
					name="username" th:value="${username}" class="form-control"
					required>
			</div>

			<div class="form-group mb-3">
				<label class="form-label">Contraseña</label> <input type="password"
					name="password" class="form-control" required>
			</div>

			<div class="form-group mb-3">
				<label class="form-label">Confirmar contraseña</label> <input
					type="password" name="confirmPassword" class="form-control"
					required>
			</div>

			<button type="submit" class="btn btn-success w-100 btn-custom">Registrarse</button>
		</form>

		<div class="text-center mt-3">
			<a th:href="@{/login}">¿Ya tienes cuenta? Inicia sesión</a>
		</div>
	</div>

	<!-- JS Bootstrap -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
