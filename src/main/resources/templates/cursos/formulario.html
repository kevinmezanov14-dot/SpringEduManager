<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Nuevo Curso - EduManager</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

	<!-- Navbar -->
	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-4">

		<h2 class="mb-4">Agregar Curso</h2>

		<div class="card p-4 shadow">
			<form th:action="@{/cursos/guardar}" th:object="${curso}"
				method="post">

				<!-- ID oculto -->
				<input type="hidden" th:field="*{id}" />

				<div class="mb-3">
					<label class="form-label">Nombre</label> <input type="text"
						th:field="*{nombre}" class="form-control" required>
				</div>

				<div class="mb-3">
					<label class="form-label">Descripción</label> <input type="text"
						th:field="*{descripcion}" class="form-control" required>
				</div>

				<div class="mb-3">
					<label class="form-label">Instructor</label> <input type="text"
						th:field="*{instructor}" class="form-control" required>
				</div>

				<button class="btn btn-success">Guardar</button>
				<a th:href="@{/cursos}" class="btn btn-secondary">Cancelar</a>

			</form>

		</div>

	</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
