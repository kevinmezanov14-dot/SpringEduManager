
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Cursos - EduManager</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" th:href="@{/css/main.css}">
<link rel="icon" type="image/svg+xml" th:href="@{/favicon.ico}">
</head>

<body>

	<!-- Navbar -->
	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-4">

		<div class="d-flex justify-content-between align-items-center mb-3">
			<h2>Lista de Cursos</h2>

			<div>
				<a th:href="@{/}" class="btn btn-secondary">Inicio</a> <span
					sec:authorize="hasRole('ADMIN')"> <a
					th:href="@{/cursos/nuevo}" class="btn btn-primary"> ➕ Agregar
						Curso </a>
				</span>
			</div>
		</div>

		<!-- ERROR -->
		<div th:if="${error}" class="alert alert-danger">
			<span th:text="${error}"></span>
		</div>

		<!-- SUCCESS -->
		<div th:if="${success}" class="alert alert-success">
			<span th:text="${success}"></span>
		</div>

		<div class="card p-3 shadow">

			<table class="table table-striped table-hover align-middle">

				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Nombre</th>
						<th>Descripción</th>
						<th>Instructor</th>
						<th sec:authorize="hasRole('ADMIN')">Acciones</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="curso : ${cursos}">
						<td th:text="${curso.id}"></td>
						<td th:text="${curso.nombre}"></td>
						<td th:text="${curso.descripcion}"></td>
						<td th:text="${curso.instructor}"></td>

						<td sec:authorize="hasRole('ADMIN')">
							<div class="table-actions">
								<a th:href="@{/cursos/editar/{id}(id=${curso.id})}"
									class="btn-edit">Editar</a> <a
									th:href="@{/cursos/eliminar/{id}(id=${curso.id})}"
									class="btn-delete" onclick="return confirm('¿Eliminar?')">Eliminar</a>
							</div>
						</td>
					</tr>
				</tbody>

			</table>

		</div>

	</div>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
